<div *ngIf="productsFound.length > 0">
    <div class="produitElement" *ngFor="let produit of productsFound; trackBy: trackById">
        <img [src]="produit.imagePath" alt="{{ produit.nom }}" width="200">
        <h3>{{ produit.nom }}</h3>
        <p>Prix : {{ produit.prix }} €</p>
    </div>
</div>
