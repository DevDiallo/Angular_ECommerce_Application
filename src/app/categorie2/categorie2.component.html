<div *ngIf="produitsCategorie2$ | async as produitCategorie">
    <div class="produitCategorie2" *ngFor="let produit of produitCategorie ; trackBy: trackById">
        <img [src]="produit.imagePath" alt="{{ produit.nom }}" width="200">
        <h3>{{ produit.nom }}</h3>
        <p>Prix : {{ produit.prix }} €</p>
        <button (click)="ajoutPanier(produit)">Ajouter au panier</button>
    </div>
</div>
