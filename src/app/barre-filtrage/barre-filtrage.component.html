<div class="categorieProduit">
  <a routerLink="categorieA">Catégorie 1</a>
  <a routerLink="categorieB">Catégorie 2</a>

  <form (ngSubmit)="rechercherProduit()">
    <input
      type="text"
      [(ngModel)]="termeRecherche"
      name="recherche"
      placeholder="Rechercher un produit..."
    />
    <button type="submit">Rechercher</button>
  </form>
</div>
